name: Hamta OSINT-data

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checka ut repo
        uses: actions/checkout@v4

      - name: Satt upp Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installera beroenden
        run: pip install feedparser requests

      - name: Kor hamtningsskript
        run: python scripts/fetch.py

      - name: Commita och pusha data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json data/polymarket.json
          git diff --staged --quiet || git commit -m "data: uppdatera floden $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push
