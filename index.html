<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INTELFEED // OSINT</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Teko:wght@300;400;600;700&family=DM+Sans:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #04070a;
  --bg2:    #070c11;
  --bg3:    #0b1118;
  --b:      #141f2c;
  --bhi:    #1c2e42;
  --cyan:   #00deff;
  --red:    #ff2d55;
  --amber:  #ffab00;
  --green:  #00f57a;
  --dim:    #304860;
  --mid:    #6a8faa;
  --text:   #bdd4e8;
  --bright: #e8f4ff;
  --mono:   'Share Tech Mono', monospace;
  --head:   'Teko', sans-serif;
  --body:   'DM Sans', sans-serif;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; }
body {
  background:var(--bg); color:var(--text);
  font-family:var(--body); font-size:14px;
  display:flex; flex-direction:column;
}

/* Scanlines */
body::before {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:9999;
  background:repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,.07) 2px, rgba(0,0,0,.07) 4px
  );
}

/* Corner glow */
body::after {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse 60% 40% at 0% 0%, rgba(0,160,220,.06) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 100% 100%, rgba(0,80,120,.05) 0%, transparent 60%);
}

/* ── HEADER ──────────────────────────────────────────────── */
header {
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px; height:52px;
  border-bottom:1px solid var(--b);
  background:linear-gradient(180deg, rgba(0,20,40,.8) 0%, var(--bg2) 100%);
  flex-shrink:0; position:relative; z-index:10;
}
.wordmark {
  font-family:var(--head); font-size:26px; font-weight:700;
  letter-spacing:5px; color:var(--bright);
  display:flex; align-items:center; gap:10px;
}
.wordmark-dot {
  width:8px; height:8px; border-radius:50%; background:var(--cyan);
  animation:glow 2s ease-in-out infinite;
  box-shadow:0 0 8px var(--cyan);
}
@keyframes glow { 0%,100%{opacity:1;box-shadow:0 0 8px var(--cyan)} 50%{opacity:.3;box-shadow:none} }
.wordmark em { color:var(--cyan); font-style:normal; }

.alert-pill {
  padding:5px 16px;
  border:1px solid var(--amber);
  background:rgba(255,171,0,.06);
  font-family:var(--head); font-size:17px; font-weight:600;
  letter-spacing:3px; color:var(--amber);
  position:relative; overflow:hidden;
}
.alert-pill::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(90deg,transparent,rgba(255,171,0,.05),transparent);
  animation:sweep 3s linear infinite;
}
@keyframes sweep { from{transform:translateX(-100%)} to{transform:translateX(100%)} }

.hdr-right {
  display:flex; align-items:center; gap:16px;
  font-family:var(--mono); font-size:10px; color:var(--dim);
  letter-spacing:1px;
}
.live-badge {
  display:flex; align-items:center; gap:5px; color:var(--green);
}
.pulse { width:6px; height:6px; border-radius:50%; background:var(--green); animation:pulse 1.6s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.1} }

/* ── LAYOUT ──────────────────────────────────────────────── */
.layout {
  display:grid; grid-template-columns:1fr 310px;
  flex:1; overflow:hidden; position:relative; z-index:1;
}

/* ── FEED PANEL ──────────────────────────────────────────── */
.feed-panel { display:flex; flex-direction:column; border-right:1px solid var(--b); overflow:hidden; }

.panel-bar {
  display:flex; align-items:center; justify-content:space-between;
  padding:0 16px; height:38px; border-bottom:1px solid var(--b);
  background:var(--bg2); flex-shrink:0;
}
.bar-label { font-family:var(--mono); font-size:10px; letter-spacing:2px; color:var(--dim); }

.cat-strip {
  display:flex; border-bottom:1px solid var(--b);
  background:var(--bg2); flex-shrink:0; overflow-x:auto;
}
.cat-strip::-webkit-scrollbar { display:none; }
.cat {
  padding:0 14px; height:34px;
  font-family:var(--mono); font-size:10px; letter-spacing:1px;
  border:none; border-bottom:2px solid transparent;
  background:none; color:var(--dim); cursor:pointer;
  transition:color .15s, border-color .15s; white-space:nowrap;
  display:flex; align-items:center; gap:6px;
}
.cat:hover { color:var(--text); }
.cat.active { color:var(--cyan); border-bottom-color:var(--cyan); }
.cat-count {
  font-size:9px; padding:1px 4px;
  background:rgba(0,222,255,.1); color:var(--cyan); border-radius:2px;
}

.feed-list { flex:1; overflow-y:auto; }
.feed-list::-webkit-scrollbar { width:2px; }
.feed-list::-webkit-scrollbar-thumb { background:var(--bhi); }

/* ── FEED ITEMS ──────────────────────────────────────────── */
.item {
  padding:13px 16px; border-bottom:1px solid var(--b);
  cursor:pointer; transition:background .1s;
  animation:fadeup .25s ease both;
}
@keyframes fadeup { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
.item:hover { background:var(--bg3); }
.item.high { border-left:2px solid var(--red); }
.item.med  { border-left:2px solid var(--amber); }
.item.low  { border-left:2px solid var(--cyan); }

.item-top { display:flex; align-items:center; gap:7px; margin-bottom:5px; }
.tag {
  font-family:var(--mono); font-size:9px; letter-spacing:.5px;
  padding:1px 6px; border-radius:1px;
}
.tag-src  { background:rgba(0,222,255,.08); color:var(--cyan); }
.tag-high { background:rgba(255,45,85,.08);  color:var(--red); }
.tag-med  { background:rgba(255,171,0,.08);  color:var(--amber); }
.tag-cat  { color:var(--dim); font-size:9px; font-family:var(--mono); }
.item-age { font-family:var(--mono); font-size:9px; color:var(--dim); margin-left:auto; }

.item-title {
  font-family:var(--head); font-size:15px; font-weight:600;
  color:var(--bright); line-height:1.35; margin-bottom:4px;
}
.item-body {
  font-size:12px; color:var(--mid); line-height:1.55;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
}
.item-link {
  display:inline-flex; align-items:center; gap:4px;
  margin-top:6px; font-family:var(--mono); font-size:9px;
  color:var(--cyan); text-decoration:none; letter-spacing:1px;
}
.item-link:hover { color:var(--bright); }

/* ── EMPTY / LOADING STATES ──────────────────────────────── */
.state {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; padding:60px 24px; gap:14px; text-align:center;
}
.spinner {
  width:28px; height:28px;
  border:1.5px solid var(--b); border-top-color:var(--cyan);
  border-radius:50%; animation:spin .7s linear infinite;
}
@keyframes spin { to{transform:rotate(360deg)} }
.state-h { font-family:var(--mono); font-size:11px; color:var(--dim); letter-spacing:2px; }
.state-s { font-family:var(--mono); font-size:10px; color:var(--b); line-height:1.7; max-width:280px; }

/* ── SIDEBAR ─────────────────────────────────────────────── */
.sidebar { display:flex; flex-direction:column; overflow:hidden; background:var(--bg2); }
.sidebar-list { flex:1; overflow-y:auto; }
.sidebar-list::-webkit-scrollbar { width:2px; }
.sidebar-list::-webkit-scrollbar-thumb { background:var(--bhi); }

.mcard {
  padding:13px 14px; border-bottom:1px solid var(--b);
  cursor:pointer; transition:background .1s;
}
.mcard:hover { background:var(--bg3); }
.mcard-q {
  font-family:var(--head); font-size:13px; font-weight:600;
  color:var(--text); line-height:1.35; margin-bottom:9px;
}
.prob-row { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:5px; }
.prob-num { font-family:var(--mono); font-size:24px; font-weight:bold; line-height:1; }
.prob-num.high { color:var(--red); }
.prob-num.mid  { color:var(--amber); }
.prob-num.low  { color:var(--green); }
.prob-lbl { font-family:var(--mono); font-size:9px; color:var(--dim); letter-spacing:1px; }
.bar { height:2px; background:var(--b); border-radius:1px; overflow:hidden; margin-bottom:6px; }
.bar-fill { height:100%; border-radius:1px; transition:width 1s ease; }
.bar-fill.high { background:var(--red); }
.bar-fill.mid  { background:var(--amber); }
.bar-fill.low  { background:var(--green); }
.mcard-foot { display:flex; justify-content:space-between; align-items:center; }
.mcard-vol { font-family:var(--mono); font-size:9px; color:var(--dim); }
.mcard-trend { font-family:var(--mono); font-size:9px; }
.mcard-trend.up   { color:var(--red); }
.mcard-trend.down { color:var(--green); }
.mcard-trend.flat { color:var(--dim); }

/* ── TICKER ──────────────────────────────────────────────── */
.ticker {
  height:28px; overflow:hidden; border-top:1px solid var(--b);
  background:var(--bg); flex-shrink:0; display:flex; align-items:center;
}
.ticker-track {
  display:flex; gap:56px; white-space:nowrap;
  animation:ticker 35s linear infinite;
}
@keyframes ticker { from{transform:translateX(0)} to{transform:translateX(-50%)} }
.tick-item { font-family:var(--mono); font-size:10px; color:var(--dim); }
.tick-item strong { margin-right:6px; color:var(--cyan); }

/* ── STATUS BAR ──────────────────────────────────────────── */
.statusbar {
  display:flex; align-items:center; gap:16px;
  height:26px; padding:0 16px; border-top:1px solid var(--b);
  background:var(--bg); flex-shrink:0;
  font-family:var(--mono); font-size:9px; color:var(--dim); letter-spacing:1px;
}
.s-dot { width:5px; height:5px; border-radius:50%; flex-shrink:0; }
.s-dot.ok  { background:var(--green); }
.s-dot.err { background:var(--red); }
.s-dot.unk { background:var(--dim); }
</style>
</head>
<body>

<header>
  <div class="wordmark">
    <div class="wordmark-dot"></div>
    INTEL<em>FEED</em>
  </div>
  <div class="alert-pill" id="alert-pill">INITIERAR</div>
  <div class="hdr-right">
    <div class="live-badge"><div class="pulse"></div>LIVE</div>
    <span id="clock">--:--:--Z</span>
  </div>
</header>

<div class="layout">

  <!-- LEFT: NEWS -->
  <div class="feed-panel">
    <div class="panel-bar">
      <span class="bar-label" id="feed-status">LADDAR DATA...</span>
      <span class="bar-label" id="feed-updated"></span>
    </div>
    <div class="cat-strip" id="cat-strip">
      <button class="cat active" onclick="setFilter('ALL',this)">ALLA <span class="cat-count" id="cnt-ALL">0</span></button>
      <button class="cat" onclick="setFilter('UKRAINA',this)">UKRAINA <span class="cat-count" id="cnt-UKRAINA">0</span></button>
      <button class="cat" onclick="setFilter('MELLANÖSTERN',this)">MELLANÖSTERN <span class="cat-count" id="cnt-MELLANÖSTERN">0</span></button>
      <button class="cat" onclick="setFilter('NORDEN',this)">NORDEN <span class="cat-count" id="cnt-NORDEN">0</span></button>
      <button class="cat" onclick="setFilter('KINA/TAIWAN',this)">KINA/TAIWAN <span class="cat-count" id="cnt-KINA/TAIWAN">0</span></button>
      <button class="cat" onclick="setFilter('HYBRID',this)">HYBRIDHOT <span class="cat-count" id="cnt-HYBRID">0</span></button>
      <button class="cat" onclick="setFilter('GENERAL',this)">GENERAL <span class="cat-count" id="cnt-GENERAL">0</span></button>
    </div>
    <div class="feed-list" id="feed-list">
      <div class="state">
        <div class="spinner"></div>
        <div class="state-h">HÄMTAR NYHETER...</div>
      </div>
    </div>
    <div class="statusbar" id="statusbar"></div>
  </div>

  <!-- RIGHT: POLYMARKET -->
  <div class="sidebar">
    <div class="panel-bar">
      <span class="bar-label">POLYMARKET · SANNOLIKHETER</span>
      <span class="bar-label" id="pm-updated"></span>
    </div>
    <div class="sidebar-list" id="market-list">
      <div class="state">
        <div class="spinner"></div>
        <div class="state-h">LADDAR MARKNADER...</div>
      </div>
    </div>
    <div class="ticker" id="ticker">
      <div class="ticker-track" id="ticker-track"></div>
    </div>
  </div>

</div>

<script>
// ── CLOCK ─────────────────────────────────────────────────────
(function clk(){
  const n = new Date();
  document.getElementById('clock').textContent =
    [n.getUTCHours(),n.getUTCMinutes(),n.getUTCSeconds()]
      .map(v=>String(v).padStart(2,'0')).join(':') + 'Z';
  setTimeout(clk, 1000);
})();

// ── STATE ─────────────────────────────────────────────────────
let allNews = [];
let activeFilter = 'ALL';

function probClass(p){ return p>=35?'high':p>=15?'mid':'low'; }

function formatDate(iso){
  if(!iso) return '';
  const d = new Date(iso);
  return d.toLocaleString('sv-SE',{timeZone:'UTC',hour:'2-digit',minute:'2-digit',day:'numeric',month:'short'}) + ' UTC';
}

// ── LOAD NEWS ─────────────────────────────────────────────────
async function loadNews(){
  try {
    const res = await fetch(`data/news.json?t=${Date.now()}`);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    allNews = data.items || [];

    // Update counts
    const cats = ['ALL','UKRAINA','MELLANÖSTERN','NORDEN','KINA/TAIWAN','HYBRID','GENERAL'];
    cats.forEach(c => {
      const el = document.getElementById('cnt-'+c);
      if(el) el.textContent = c==='ALL' ? allNews.length : allNews.filter(i=>i.category===c).length;
    });

    // Alert level
    const highCount = allNews.filter(i=>i.severity==='high').length;
    const pill = document.getElementById('alert-pill');
    if(highCount > 5){
      pill.textContent = 'FÖRHÖJD BEREDSKAP';
      pill.style.borderColor = 'var(--red)';
      pill.style.color = 'var(--red)';
    } else if(highCount > 0){
      pill.textContent = 'FÖRHÖJD';
      pill.style.borderColor = 'var(--amber)';
      pill.style.color = 'var(--amber)';
    } else {
      pill.textContent = 'NORMALT';
      pill.style.borderColor = 'var(--green)';
      pill.style.color = 'var(--green)';
    }

    document.getElementById('feed-status').textContent = `${allNews.length} POSTER`;
    document.getElementById('feed-updated').textContent = `UPPDATERAD ${formatDate(data.updated)}`;

    // Status bar
    const stats = data.stats || {};
    const bar = document.getElementById('statusbar');
    bar.innerHTML = (stats.sources||[]).map(s=>
      `<div style="display:flex;align-items:center;gap:4px;">
        <div class="s-dot ${s.status==='ok'?'ok':'err'}"></div>
        <span>${s.name}</span>
      </div>`
    ).join('') + `<span style="margin-left:auto;">${stats.ok||0} OK · ${stats.fail||0} FEL</span>`;

    renderNews(activeFilter);

  } catch(e){
    document.getElementById('feed-list').innerHTML = `
      <div class="state">
        <div class="state-h" style="color:var(--red)">KAN INTE LADDA data/news.json</div>
        <div class="state-s">${e.message}<br><br>Kontrollera att GitHub Actions har körts minst en gång och att data/-mappen finns i repot.</div>
      </div>`;
    document.getElementById('feed-status').textContent = 'FEL';
  }
}

// ── RENDER NEWS ───────────────────────────────────────────────
function renderNews(filter){
  const list = document.getElementById('feed-list');
  const items = filter==='ALL' ? allNews : allNews.filter(i=>i.category===filter);

  if(!items.length){
    list.innerHTML = `<div class="state"><div class="state-h">INGA POSTER FÖR ${filter}</div></div>`;
    return;
  }

  list.innerHTML = items.map((item,idx) => {
    const srcClass = item.severity==='high'?'tag-high':item.severity==='med'?'tag-med':'tag-src';
    return `<div class="item ${item.severity||'low'}" style="animation-delay:${Math.min(idx*20,400)}ms"
      onclick="${item.url?`window.open(${JSON.stringify(item.url)},'_blank')`:''}">
      <div class="item-top">
        <span class="tag ${srcClass}">${item.source||'?'}</span>
        <span class="tag-cat">${item.category||''}</span>
        <span class="item-age">${item.age||''}</span>
      </div>
      <div class="item-title">${item.title||''}</div>
      ${item.body?`<div class="item-body">${item.body}</div>`:''}
      ${item.url?`<a class="item-link" href="${item.url}" target="_blank" onclick="event.stopPropagation()">↗ LÄS MER</a>`:''}
    </div>`;
  }).join('');
}

function setFilter(f, btn){
  activeFilter = f;
  document.querySelectorAll('.cat').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderNews(f);
}

// ── LOAD POLYMARKET ───────────────────────────────────────────
async function loadPolymarket(){
  try {
    const res = await fetch(`data/polymarket.json?t=${Date.now()}`);
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const markets = data.markets || [];

    document.getElementById('pm-updated').textContent = formatDate(data.updated);

    if(!markets.length){
      document.getElementById('market-list').innerHTML =
        `<div class="state"><div class="state-h">INGA MARKNADER</div><div class="state-s">GitHub Actions har inte hämtat Polymarket-data än.</div></div>`;
      return;
    }

    document.getElementById('market-list').innerHTML = markets.map(m => {
      const cls = probClass(m.prob);
      const trendStr = m.trend==='up'?`↑ +${m.trendPct}%`:m.trend==='down'?`↓ -${m.trendPct}%`:'→ STABILT';
      return `<div class="mcard" onclick="${m.url?`window.open(${JSON.stringify(m.url)},'_blank')`:''}">
        <div class="mcard-q">${m.question}</div>
        <div class="prob-row">
          <span class="prob-num ${cls}">${m.prob}%</span>
          <span class="prob-lbl">SANNOLIKHET · JA</span>
        </div>
        <div class="bar"><div class="bar-fill ${cls}" style="width:${m.prob}%"></div></div>
        <div class="mcard-foot">
          <span class="mcard-vol">${m.volume||''}</span>
          <span class="mcard-trend ${m.trend||'flat'}">${trendStr}</span>
        </div>
      </div>`;
    }).join('');

    // Ticker
    const doubled = [...markets,...markets];
    document.getElementById('ticker-track').innerHTML =
      doubled.map(m=>`<span class="tick-item"><strong>${m.prob}%</strong>${m.question}</span>`).join('');

  } catch(e){
    document.getElementById('market-list').innerHTML =
      `<div class="state"><div class="state-h" style="color:var(--red)">FEL</div><div class="state-s">${e.message}</div></div>`;
  }
}

// ── INIT + AUTO-REFRESH ───────────────────────────────────────
loadNews();
loadPolymarket();
setInterval(loadNews, 5 * 60 * 1000);        // Uppdatera UI var 5:e min
setInterval(loadPolymarket, 5 * 60 * 1000);
</script>
</body>
</html>
